<header class="site-header">
  <div class="site-branding">
    <a href="{{ "/" | relURL }}">Hossein Moosavi</a>
  </div>

  <button class="theme-toggle" type="button" aria-label="Toggle light and dark mode">Theme</button>

  <nav aria-label="Primary">
    <ul class="main-nav">
      {{ $currentPage := . }}
      {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}"
             {{ if $currentPage.IsMenuCurrent .Menu . }}class="active" aria-current="page"
             {{ else if $currentPage.HasMenuCurrent .Menu . }}class="active" aria-current="true"
             {{ end }}>
             {{ .Name }}
          </a>
        </li>
      {{ end }}
    </ul>
  </nav>
</header>
