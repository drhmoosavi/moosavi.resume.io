{{ define "main" }}
<section class="content-page">
  <header>
    <h1>{{ .Title }}</h1>
    {{ with .Content }}<div class="content-body">{{ . }}</div>{{ end }}
  </header>

  <div class="card-grid">
    {{ range .Pages.ByDate.Reverse }}
      <article class="card">
        <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
        <p class="meta">{{ .Date.Format "January 2, 2006" }}</p>
        {{ with .Params.summary }}<p>{{ . }}</p>{{ end }}
      </article>
    {{ end }}
  </div>
</section>
{{ end }}
