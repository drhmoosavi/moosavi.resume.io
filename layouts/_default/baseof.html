<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <div class="container blog-container nav-transition" id="appContainer">
    {{ partial "nav.html" . }}
    {{ partial "blog_contact_panel.html" . }}

    <aside class="blog-left-sidebar" aria-label="Blog sidebar">
      {{ block "sidebar" . }}
      <section class="section-block blog-sidebar-card">
        <h3>Recent Posts</h3>
        <ul>
          {{ range first 6 (where .Site.RegularPages "Section" "posts") }}
            <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
          {{ end }}
        </ul>
      </section>
      {{ end }}
    </aside>

    <main class="blog-main" id="main-content">
      {{ block "main" . }}{{ end }}
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
  <script type="module" src="{{ "/toggle.js" | relURL }}"></script>
  <script type="module" src="{{ "/blog.js" | relURL }}"></script>
  <script type="module" src="{{ "/nav-transition.js" | relURL }}"></script>
</body>
</html>
