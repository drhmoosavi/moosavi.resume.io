{{ define "main" }}
<article class="content-page publication-detail">
  <header>
    <h1>{{ .Title }}</h1>
    <p class="meta">{{ .Date.Format "January 2006" }}</p>
    {{ with .Params.journal }}<p class="publication-journal">{{ . }}</p>{{ end }}
    {{ with .Params.authors }}<p class="authors">{{ delimit . ", " }}</p>{{ end }}
    {{ with .Params.doi }}<p><a href="https://doi.org/{{ . }}" target="_blank" rel="noopener noreferrer">DOI: {{ . }}</a></p>{{ end }}
  </header>

  <section class="content-body">
    {{ .Content }}
  </section>
</article>
{{ end }}
